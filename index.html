<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>札幌住所変換</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>

    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
      background: #f7f7f7;
    }

    h2 {
      font-size: 32px;
    }

    input {
      width: 85%;
      max-width: 500px;
      font-size: 28px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      font-size: 24px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
    }

    #preview {
      margin-top: 25px;
      font-size: 24px;
      color: #555;
      font-weight: bold;
    }

  </style>
</head>

<body>

<h2>札幌住所変換</h2>

<input
  id="input"
  placeholder="例: 3.6.3-5 / 3.-6.3-5"
  autocomplete="off"
>

<br>

<button onclick="search()">検索</button>

<div id="preview"></div>

<script>

//
// マイナス記号ゆれ吸収
//
function normalizeMinus(text) {

  return text.replace(/[−ー―–]/g, "-");

}

//
// 北南・東西変換
//
function parseDirection(value, positive, negative) {

  if (value.startsWith("-")) {

    return negative + value.slice(1);

  } else {

    return positive + value.replace("+", "");

  }

}

//
// 入力変換
//
function convert(input) {

  input = normalizeMinus(input.trim());

  const parts = input.split(".");

  if (parts.length < 3) {

    return null;

  }

  const jo = parts[0];
  const chome = parts[1];
  const banchi = parts.slice(2).join(".");

  const joText =
    parseDirection(jo, "北", "南") + "条";

  const chomeText =
    parseDirection(chome, "西", "東") + "丁目";

  return joText + chomeText + banchi;

}

//
// Google Maps検索
//
function search() {

  const input =
    document.getElementById("input").value;

  const address =
    convert(input);

  if (!address) {

    alert("入力例: 3.6.3-5");
    return;

  }

  const encoded =
    encodeURIComponent(address);

  //
  // Google Mapsアプリ
  //
  const appUrl =
    "comgooglemaps://?q=" + encoded;

  //
  // ブラウザ版 fallback
  //
  const webUrl =
    "https://www.google.com/maps/search/?api=1&query="
    + encoded;

  let openedApp = false;

  //
  // アプリ起動検知
  //
  function handleVisibilityChange() {

    if (document.hidden) {

      openedApp = true;

    }

  }

  document.addEventListener(
    "visibilitychange",
    handleVisibilityChange
  );

  //
  // アプリ起動試行
  //
  window.location.href = appUrl;

  //
  // アプリ開けなかった場合のみweb版
  //
  setTimeout(() => {

    if (!openedApp) {

      window.location.href = webUrl;

    }

    document.removeEventListener(
      "visibilitychange",
      handleVisibilityChange
    );

  }, 1200);

}

//
// Enterキー検索
//
document.getElementById("input")
.addEventListener("keypress", function(e) {

  if (e.key === "Enter") {

    search();

  }

});

//
// リアルタイム変換表示
//
document.getElementById("input")
.addEventListener("input", function(e) {

  const address =
    convert(e.target.value);

  document.getElementById("preview").innerText =

    address
      ? "→ " + address
      : "";

});

</script>

</body>
</html>
