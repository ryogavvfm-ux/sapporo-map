<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>札幌住所変換</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    input {
      width: 80%;
      font-size: 20px;
      padding: 10px;
    }
    button {
      font-size: 20px;
      padding: 10px 20px;
      margin-top: 10px;
    }
    #preview {
      margin-top: 20px;
      font-size: 18px;
      color: gray;
    }
  </style>
</head>
<body>

<h2>札幌住所変換</h2>
<input id="input" placeholder="例: 3 6 2-1 / -3 -6 2-1">
<br>
<button onclick="search()">検索</button>

<div id="preview"></div>

<script>
function parseDirection(value, plusDefault, minusDirection) {
  if (value.startsWith("+")) {
    return plusDefault + value.slice(1);
  } else if (value.startsWith("-")) {
    return minusDirection + value.slice(1);
  } else {
    return plusDefault + value;
  }
}

function convert(input) {
  input = input.trim();

  // 区切りを統一（スペース or ハイフン）
  input = input.replace(/-/g, " ");
  const parts = input.split(/\s+/);

  if (parts.length < 3) return null;

  const jo = parts[0];
  const chome = parts[1];
  const banchi = parts.slice(2).join("-");

  const joText = parseDirection(jo, "北", "南") + "条";
  const chomeText = parseDirection(chome, "西", "東") + "丁目";

  return joText + chomeText + banchi;
}

function search() {
  const input = document.getElementById("input").value;
  const address = convert(input);

  if (!address) {
    alert("入力例: 3 6 2-1");
    return;
  }

  const encoded = encodeURIComponent(address);

  // Google Mapsアプリ
  const appUrl = "comgooglemaps://?q=" + encoded;

  // ブラウザ fallback
  const webUrl = "https://www.google.com/maps/search/?api=1&query=" + encoded;

  // アプリ起動試行
  window.location.href = appUrl;

  // ダメならブラウザ
  setTimeout(() => {
    window.location.href = webUrl;
  }, 800);
}

// Enterキー対応
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    search();
  }
});

// リアルタイムプレビュー
document.getElementById("input").addEventListener("input", function(e) {
  const address = convert(e.target.value);
  document.getElementById("preview").innerText =
    address ? "→ " + address : "";
});
</script>

</body>
</html>
